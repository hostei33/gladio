name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-glibc-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross compiler and X11 dev libs
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/deb http/deb [arch=amd64] http/' /etc/apt/sources.list
          sudo sed -i '/^deb /a deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main' /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libx11-dev:arm64

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS_RELEASE="-O2 -Wl,-rpath=/data/data/com.winlator/files/rootfs/lib" \
            -DCMAKE_INSTALL_PREFIX=/data/data/com.winlator/files/rootfs/usr

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libGL-aarch64
          path: build/libGL.so